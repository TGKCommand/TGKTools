<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TGK — Link Group Mapper</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=JetBrains+Mono:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap');
:root{--bg:#0a0b0d;--card:#111316;--card2:#181a1e;--border:#22252b;--border2:#2e323a;--txt:#e8eaf0;--txt2:#a0a6b4;--txt3:#5a6070;--teal:#4ecdc4;--blue:#5b8dee;--amber:#f0a500;--green:#3ecf72;--red:#e05560;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;font-size:13px;height:100vh;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(78,205,196,.03)1px,transparent 1px),linear-gradient(90deg,rgba(78,205,196,.03)1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:24px 20px;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* HEADER */
.hdr{display:flex;align-items:center;gap:14px;margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--border);}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--teal);}
.sep{width:1px;height:28px;background:var(--border2);}
.hdr-t{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;}
.hdr-s{font-size:11px;color:var(--txt3);margin-top:1px;}
.hdr-r{margin-left:auto;display:flex;gap:8px;}

/* BUTTONS */
.bp{background:var(--teal);color:#000;border:none;border-radius:5px;padding:8px 16px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;transition:opacity .15s;}
.bp:hover{opacity:.85;}.bp:disabled{opacity:.4;cursor:default;}
.bs{background:transparent;color:var(--txt2);border:1px solid var(--border2);border-radius:5px;padding:7px 13px;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s;}
.bs:hover{border-color:var(--teal);color:var(--teal);}
.bx{background:transparent;color:var(--txt3);border:1px solid var(--border);border-radius:4px;padding:3px 9px;font-size:10px;cursor:pointer;transition:all .12s;}
.bx:hover{border-color:var(--teal);color:var(--teal);}
.bx.del:hover{border-color:var(--red);color:var(--red);}

/* LAYOUT */
.cols{display:grid;grid-template-columns:380px 1fr;gap:16px;align-items:start;}
.left-col{position:sticky;top:24px;max-height:calc(100vh - 48px);display:flex;flex-direction:column;gap:12px;}
.right-col{min-height:0;}
.groups-scroll{overflow-y:auto;max-height:calc(100vh - 160px);padding-right:4px;}
.groups-scroll::-webkit-scrollbar{width:4px;}
.groups-scroll::-webkit-scrollbar-track{background:transparent;}
.groups-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* INBOX PANEL */
.panel{background:var(--card);border:1px solid var(--border2);border-radius:8px;overflow:hidden;}
.ph{background:var(--card2);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:8px;}
.pt{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;}
.pc{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--teal);background:rgba(78,205,196,.1);border:1px solid rgba(78,205,196,.2);border-radius:10px;padding:1px 7px;}
.pb{padding:12px;}

/* PRODUCT ITEM IN INBOX */
.prod{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:5px;border:1px solid transparent;margin-bottom:4px;cursor:grab;transition:all .12s;user-select:none;background:var(--card2);}
.prod:hover{border-color:var(--border2);}
.prod.dragging{opacity:.4;border-style:dashed;}
.prod.over{border-color:var(--teal);background:rgba(78,205,196,.05);}
.prod-name{flex:1;font-size:11px;color:var(--txt);}
.prod-grip{color:var(--txt3);font-size:12px;cursor:grab;}

/* GROUP CARDS */
.groups-area{display:flex;flex-direction:column;gap:12px;}
.gc{background:var(--card);border:1px solid var(--border2);border-radius:8px;overflow:hidden;transition:border-color .15s;}
.gc.drop-target{border-color:var(--teal);background:rgba(78,205,196,.03);}
.gc.has-items{border-color:rgba(78,205,196,.25);}
.gch{background:var(--card2);border-bottom:1px solid var(--border);padding:9px 12px;display:flex;align-items:center;gap:8px;}
.gcn{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--teal);flex:1;}
.gcn[contenteditable=true]:focus{outline:1px solid var(--teal);border-radius:2px;}
.gcd{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--blue);min-width:0;}
.gcb{padding:10px 12px;min-height:48px;}
.gcb.empty{display:flex;align-items:center;justify-content:center;color:var(--txt3);font-size:11px;font-style:italic;border:1px dashed var(--border2);border-radius:4px;min-height:44px;}
.gp{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--border);}
.gp:last-child{border-bottom:none;}
.gp-name{flex:1;font-size:11px;color:var(--txt2);}
.gcf{padding:7px 12px;border-top:1px solid var(--border);display:flex;gap:6px;align-items:center;}
.dim-inp{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--blue);background:transparent;border:1px dashed var(--border2);border-radius:3px;padding:3px 8px;outline:none;width:160px;}
.dim-inp:focus{border-color:var(--blue);}
.dim-inp::placeholder{color:var(--border2);}
.note-inp{flex:1;font-size:10px;color:var(--txt2);background:transparent;border:1px dashed var(--border2);border-radius:3px;padding:3px 8px;outline:none;}
.note-inp:focus{border-color:var(--amber);}

/* LIGHTBOX */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;display:none;align-items:center;justify-content:center;cursor:zoom-out;}
#lightbox.show{display:flex;}
#lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:6px;box-shadow:0 0 60px rgba(0,0,0,.8);}
#lightbox-close{position:fixed;top:20px;right:24px;font-size:28px;color:#fff;cursor:pointer;opacity:.7;line-height:1;}
#lightbox-close:hover{opacity:1;}
.gc-img-wrap{position:relative;display:inline-block;}
.gc-img{width:56px;height:56px;object-fit:cover;border-radius:5px;border:1px solid var(--border2);display:block;cursor:pointer;}
.gc-img-del{position:absolute;top:-5px;right:-5px;width:16px;height:16px;border-radius:50%;background:var(--red);border:none;color:#fff;font-size:9px;line-height:16px;text-align:center;cursor:pointer;display:none;}
.gc-img-wrap:hover .gc-img-del{display:block;}
.gc-img-placeholder{width:56px;height:56px;border:1px dashed var(--border2);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--txt3);cursor:pointer;transition:all .15s;flex-shrink:0;}
.gc-img-placeholder:hover{border-color:var(--teal);color:var(--teal);}

/* ADD GROUP ZONE */
.add-group{border:1px dashed var(--border2);border-radius:8px;padding:14px;text-align:center;cursor:pointer;color:var(--txt3);font-size:12px;transition:all .15s;}
.add-group:hover{border-color:var(--teal);color:var(--teal);}

/* PASTE AREA */
.paste-area{width:100%;background:var(--card2);border:1px solid var(--border2);border-radius:5px;padding:9px 12px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--txt2);outline:none;resize:vertical;min-height:80px;transition:border-color .15s;}
.paste-area:focus{border-color:var(--teal);}
.paste-area::placeholder{color:var(--txt3);}

/* STATUS */
.spin{display:inline-block;width:13px;height:13px;border:2px solid var(--border2);border-top-color:var(--teal);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:4px;}
@keyframes sp{to{transform:rotate(360deg);}}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;background:var(--card2);border:1px solid var(--teal);border-radius:6px;padding:10px 16px;font-size:12px;color:var(--txt);opacity:0;transition:opacity .2s;z-index:999;max-width:340px;pointer-events:none;}
#toast.show{opacity:1;} #toast.err{border-color:var(--red);color:var(--red);} #toast.inf{border-color:var(--border2);color:var(--txt2);}

/* API ROW */
.api-row{display:flex;gap:8px;align-items:center;margin-bottom:14px;padding:9px 12px;background:var(--card2);border:1px solid var(--border);border-radius:6px;}
.api-row label{font-size:10px;color:var(--txt3);white-space:nowrap;}
.api-row input{flex:1;background:transparent;border:1px solid var(--border2);border-radius:4px;padding:4px 9px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--txt2);outline:none;}
.api-row input:focus{border-color:var(--teal);}

input[type=text],input[type=url]{background:var(--card2);border:1px solid var(--border2);border-radius:4px;padding:6px 10px;font-size:11px;color:var(--txt);outline:none;}
input[type=text]:focus,input[type=url]:focus{border-color:var(--teal);}
</style>
</head>
<body>
<div class="wrap">

  <div class="hdr">
    <div class="logo">TGK</div>
    <div class="sep"></div>
    <div>
      <div class="hdr-t">Link Group Mapper</div>
      <div class="hdr-s">Paste competitor product names · drag them into groups · same link = same group</div>
    </div>
    <div class="hdr-r">
      <span id="sync-badge" style="font-size:10px;color:#555;align-self:center;margin-right:4px">Connecting…</span>
      <button class="bs" onclick="exportCSV()">⬇ CSV</button>
      <button class="bs" onclick="exportJSON()">⬇ JSON</button>
      <button class="bs" onclick="triggerImportJSON()">⬆ Import JSON</button>
      <button class="bs" onclick="clearAll()" style="color:var(--red);border-color:var(--border);">✕ Clear All</button>
      <input type="file" id="import-json-input" accept=".json" style="display:none" onchange="importJSON(this)"/>
    </div>
  </div>

  <!-- API KEY -->
  <div class="api-row">
    <label>Anthropic API Key (optional — for AI parse)</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." oninput="saveKey()">
    <span id="keyStatus" style="font-size:10px;color:var(--txt3);">Not set</span>
  </div>

  <div class="cols" style="flex:1;min-height:0;">

    <!-- LEFT: INBOX (sticky) -->
    <div class="left-col">
      <div class="panel" style="display:flex;flex-direction:column;min-height:0;flex:1;">
        <div class="ph">
          <div class="pt">Product Inbox</div>
          <div class="pc" id="inboxCt">0</div>
          <div style="margin-left:auto;display:flex;gap:6px;">
            <button class="bx" onclick="sortInbox()">A→Z</button>
            <button class="bx del" onclick="clearInbox()">Clear</button>
          </div>
        </div>
        <div class="pb" style="display:flex;flex-direction:column;min-height:0;flex:1;">
          <!-- PASTE INPUT -->
          <div style="margin-bottom:10px;flex-shrink:0;">
            <div style="font-size:9px;font-weight:700;color:var(--txt3);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;">Paste product names (one per line)</div>
            <textarea class="paste-area" id="pasteInput" placeholder="Paste product names here, one per line:&#10;&#10;AUDI ETRON ORIGINAL LOWERING LINKS&#10;BMW X5 G05 LOWERING LINKS&#10;...&#10;&#10;Or paste a block of text and use AI Parse." style="min-height:60px;"></textarea>
            <div style="display:flex;gap:6px;margin-top:6px;">
              <button class="bp" onclick="parseAndAdd()" style="font-size:12px;padding:7px 14px;">+ Add to Inbox</button>
              <button class="bs" onclick="aiParse()" id="aiBtn" style="font-size:11px;">✨ AI Parse</button>
            </div>
          </div>
          <div style="height:1px;background:var(--border);margin-bottom:10px;flex-shrink:0;"></div>
          <!-- INBOX LIST — scrolls independently -->
          <div id="inboxList" style="overflow-y:auto;flex:1;min-height:0;padding-right:2px;"></div>
        </div>
      </div>

      <!-- QUICK ADD SINGLE -->
      <div class="panel" style="flex-shrink:0;">
        <div class="ph"><div class="pt">Quick Add Single</div></div>
        <div class="pb" style="display:flex;gap:6px;">
          <input type="text" id="singleName" placeholder="Product name..." style="flex:1;" onkeydown="if(event.key==='Enter')addSingle()">
          <button class="bp" onclick="addSingle()" style="font-size:12px;padding:7px 14px;">Add</button>
        </div>
      </div>
    </div>

    <!-- RIGHT: GROUPS (scrollable) -->
    <div class="right-col" style="display:flex;flex-direction:column;min-height:0;height:100%;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-shrink:0;">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--txt);">Link Groups</div>
        <div class="pc" id="groupCt">0</div>
        <div style="font-size:10px;color:var(--txt3);">Drag products into groups · same physical link = same group</div>
        <button class="bp" onclick="addGroup()" style="margin-left:auto;font-size:12px;padding:7px 16px;">+ New Group</button>
      </div>

      <div class="groups-scroll" style="flex:1;min-height:0;">
        <div class="groups-area" id="groupsArea"></div>
        <div class="add-group" onclick="addGroup()" style="margin-top:12px;">+ New Link Group</div>
      </div>
    </div>
  </div>
</div>

<div id="lightbox" onclick="closeLightbox()">
  <span id="lightbox-close" onclick="closeLightbox()">✕</span>
  <img id="lightbox-img" src="" alt="">
</div>
<div id="toast"></div>

<script>
// ── TGK Supabase Cloud Sync ───────────────────────────────────
var TGK_SB_URL = 'https://piamamighqiielfztgic.supabase.co';
var TGK_SB_KEY = 'sb_publishable_JHTuiKlkCD_EHoyDtWtKsQ_gyQ6kgfJ';
var _sbCache = null;

async function _sbGet(id) {
  try {
    var res = await fetch(TGK_SB_URL + '/rest/v1/workspace?id=eq.' + encodeURIComponent(id) + '&select=data&limit=1', {
      headers: { 'apikey': TGK_SB_KEY, 'Authorization': 'Bearer ' + TGK_SB_KEY }
    });
    var rows = await res.json();
    return (rows && rows[0]) ? rows[0].data : null;
  } catch(e) { return null; }
}

async function _sbSet(id, data) {
  try {
    await fetch(TGK_SB_URL + '/rest/v1/workspace', {
      method: 'POST',
      headers: { 'apikey': TGK_SB_KEY, 'Authorization': 'Bearer ' + TGK_SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify({ id: id, data: data, updated_at: new Date().toISOString() })
    });
  } catch(e) { console.warn('Cloud save failed:', e); }
}

function _sbToast(msg, ok) {
  var el = document.getElementById('_sb_toast');
  if (!el) { el = document.createElement('div'); el.id = '_sb_toast'; el.style.cssText = 'position:fixed;bottom:16px;right:16px;padding:8px 14px;border-radius:7px;font-size:11px;font-weight:700;z-index:9999;transition:opacity .4s;font-family:inherit'; document.body.appendChild(el); }
  el.textContent = msg; el.style.background = ok ? 'rgba(42,191,170,.9)' : 'rgba(224,85,85,.9)'; el.style.color = '#fff'; el.style.opacity = '1';
  setTimeout(function(){ el.style.opacity = '0'; }, 3000);
}

function _updateSyncBadge(status) {
  var el = document.getElementById('sync-badge');
  if(!el) return;
  if(status === 'syncing') { el.textContent = '↻ Syncing…'; el.style.color = '#888'; }
  else if(status === 'ok') { el.textContent = '✓ Synced ' + new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); el.style.color = '#2ABFAA'; }
  else if(status === 'offline') { el.textContent = '⚠ Offline'; el.style.color = '#f87171'; }
}

// Boot — called at bottom after all functions defined
async function _sbBoot() {
  _updateSyncBadge('syncing');
  try {
    var d = await _sbGet('tgk_mapper_v2');
    if (d) { _sbCache = d; localStorage.setItem('tgk_mapper_v2', JSON.stringify(d)); }
    _updateSyncBadge('ok');
    _sbToast('✓ Synced', true);
  } catch(e) { _updateSyncBadge('offline'); _sbToast('Cloud offline — local only', false); }
}
// ─────────────────────────────────────────────────────────────

// ── STATE ──
let inbox   = [];  // [{id, name}]
let groups  = [];  // [{id, name, dim, note, items:[{id,name}]}]
let dragId  = null;
let nextId  = 1;

// ── PERSIST ──
function save(){
  var payload = {inbox, groups, nextId};
  // Write localStorage immediately
  try{localStorage.setItem('tgk_mapper_v2', JSON.stringify(payload));}catch(e){}
  // Write to cloud in background
  _sbCache = payload;
  _sbSet('tgk_mapper_v2', payload);
}
function load(){
  try{
    // Use cloud cache if available, else localStorage
    var src = _sbCache || (function(){ var d=localStorage.getItem('tgk_mapper_v2'); return d?JSON.parse(d):null; })();
    if(src){inbox=src.inbox||[];groups=src.groups||[];nextId=src.nextId||1;}
  }catch(e){}
  // Migrate groups that don't have image field
  groups.forEach(g => { if(!('image' in g)) g.image = ''; });
  const k=localStorage.getItem('tgk_linkmap_key');
  if(k){document.getElementById('apiKey').value=k;updateKeyStatus(k);}
  render();
}
function saveKey(){const k=document.getElementById('apiKey').value.trim();if(k)localStorage.setItem('tgk_linkmap_key',k);updateKeyStatus(k);}
function updateKeyStatus(k){
  const el=document.getElementById('keyStatus');
  if(!k){el.textContent='Not set';el.style.color='var(--txt3)';}
  else if(k.startsWith('sk-ant-')){el.textContent='✓ Set';el.style.color='var(--green)';}
  else{el.textContent='⚠ Check format';el.style.color='var(--amber)';}
}
function getKey(){return document.getElementById('apiKey').value.trim();}
function uid(){return nextId++;}

// ── PARSE & ADD TO INBOX ──
function parseAndAdd(){
  const raw=document.getElementById('pasteInput').value;
  const lines=raw.split('\n').map(l=>l.trim()).filter(l=>l.length>2);
  if(!lines.length){toast('Nothing to add','err');return;}
  let added=0;
  for(const name of lines){
    if(!inbox.find(x=>x.name.toLowerCase()===name.toLowerCase())&&
       !groups.some(g=>g.items.find(x=>x.name.toLowerCase()===name.toLowerCase()))){
      inbox.push({id:uid(),name});added++;
    }
  }
  document.getElementById('pasteInput').value='';
  save();render();
  toast('Added '+added+' product'+(added!==1?'s':'')+' to inbox','ok');
}

function addSingle(){
  const name=document.getElementById('singleName').value.trim();
  if(!name){toast('Enter a name','err');return;}
  if(inbox.find(x=>x.name.toLowerCase()===name.toLowerCase())||
     groups.some(g=>g.items.find(x=>x.name.toLowerCase()===name.toLowerCase()))){
    toast('Already exists','inf');return;
  }
  inbox.push({id:uid(),name});
  document.getElementById('singleName').value='';
  save();render();
  toast('Added "'+name+'"','ok');
}

function sortInbox(){inbox.sort((a,b)=>a.name.localeCompare(b.name));save();render();}
function clearInbox(){if(!inbox.length)return;if(confirm('Clear inbox ('+inbox.length+' items)?')){inbox=[];save();render();}}

// ── AI PARSE ──
async function aiParse(){
  const raw=document.getElementById('pasteInput').value.trim();
  if(!raw){toast('Paste some text first','err');return;}
  const key=getKey();
  if(!key){toast('Add API key to use AI Parse','err');return;}
  const btn=document.getElementById('aiBtn');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>Parsing...';
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,messages:[{role:'user',content:
        `Extract every product name from this text. These are automotive suspension lowering link products.
Return ONLY a JSON array of strings — the product names, cleaned up, one per item. No explanations.
Example: ["BMW X5 G05 Lowering Links", "Mercedes GLC Lowering Links"]

Text:
${raw.slice(0,8000)}`}]})
    });
    if(!resp.ok)throw new Error('API '+resp.status);
    const data=await resp.json();
    const text=data.content.map(b=>b.text||'').join('');
    const m=text.match(/\[[\s\S]*\]/);
    if(!m)throw new Error('No array found in response');
    const names=JSON.parse(m[0]);
    if(!Array.isArray(names)||!names.length)throw new Error('Empty result');
    // Replace textarea with clean names
    document.getElementById('pasteInput').value=names.join('\n');
    toast('AI extracted '+names.length+' products — click Add to Inbox','ok');
  }catch(e){toast('AI parse failed: '+e.message,'err');}
  btn.disabled=false;btn.innerHTML='✨ AI Parse';
}

// ── GROUPS ──
function addGroup(name){
  const id=uid();
  const g={id,name:name||'Group '+(groups.length+1),dim:'',note:'',image:'',items:[]};
  groups.push(g);save();render();
  setTimeout(()=>{const el=document.getElementById('gn-'+id);if(el){el.focus();selectAll(el);}},50);
}

function selectAll(el){const r=document.createRange();r.selectNodeContents(el);const s=window.getSelection();s.removeAllRanges();s.addRange(r);}

function deleteGroup(id){
  const g=groups.find(x=>Number(x.id)===Number(id));
  if(!g)return;
  if(g.items.length&&!confirm('Return '+g.items.length+' item(s) to inbox and delete group?'))return;
  for(const item of g.items)inbox.push(item);
  groups=groups.filter(x=>Number(x.id)!==Number(id));
  save();render();
}

function renameGroup(id,name){const g=groups.find(x=>Number(x.id)===Number(id));if(g){g.name=name.trim()||g.name;save();}}
function updateDim(id,v){const g=groups.find(x=>Number(x.id)===Number(id));if(g){g.dim=v.trim();save();}}
function updateNote(id,v){const g=groups.find(x=>Number(x.id)===Number(id));if(g){g.note=v.trim();save();}}

function removeFromGroup(gid,iid){
  const g=groups.find(x=>Number(x.id)===Number(gid));if(!g)return;
  const item=g.items.find(x=>Number(x.id)===Number(iid));
  if(item){inbox.push(item);g.items=g.items.filter(x=>Number(x.id)!==Number(iid));}
  save();render();
}

function removeFromInbox(id){
  inbox=inbox.filter(x=>Number(x.id)!==Number(id));
  save();render();
}

// ── DRAG & DROP ──
function onDragStart(e,id){
  dragId=id;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',String(id));
  setTimeout(()=>{
    const el=document.getElementById('prod-'+id)||document.querySelector('[data-drag-id="'+id+'"]');
    if(el)el.classList.add('dragging');
  },0);
}
function onDragEnd(e){
  dragId=null;
  document.querySelectorAll('.dragging').forEach(el=>el.classList.remove('dragging'));
  document.querySelectorAll('.drop-target').forEach(el=>el.classList.remove('drop-target'));
}
function onDragOver(e,gid){
  e.preventDefault();
  e.stopPropagation();
  e.dataTransfer.dropEffect='move';
  // Only highlight the group card, not nested children
  const card=document.getElementById('gc-'+gid);
  if(card&&!card.classList.contains('drop-target'))card.classList.add('drop-target');
}
function onDragLeave(e,gid){
  // Only remove highlight when leaving the card entirely, not child elements
  const card=document.getElementById('gc-'+gid);
  if(!card)return;
  const rel=e.relatedTarget;
  if(rel&&card.contains(rel))return; // still inside the card
  card.classList.remove('drop-target');
}
function onDrop(e,gid){
  e.preventDefault();
  e.stopPropagation();
  document.getElementById('gc-'+gid)?.classList.remove('drop-target');
  // Get id — parse as number, ids are stored as numbers
  const rawId=e.dataTransfer.getData('text/plain')||String(dragId);
  const id=parseInt(rawId,10);
  if(!id&&id!==0)return;
  // Find item in inbox or any group
  let item=null;
  const ii=inbox.findIndex(x=>Number(x.id)===id);
  if(ii>=0){item=inbox.splice(ii,1)[0];}
  else{
    for(const g of groups){
      const gi=g.items.findIndex(x=>Number(x.id)===id);
      if(gi>=0){item=g.items.splice(gi,1)[0];break;}
    }
  }
  if(!item)return;
  const target=groups.find(g=>Number(g.id)===gid);
  if(target&&!target.items.find(x=>Number(x.id)===id))target.items.push(item);
  save();render();
}

function onDropInbox(e){
  e.preventDefault();
  const rawId=e.dataTransfer.getData('text/plain')||String(dragId);
  const id=parseInt(rawId,10);
  if(!id&&id!==0)return;
  for(const g of groups){
    const gi=g.items.findIndex(x=>Number(x.id)===id);
    if(gi>=0){const item=g.items.splice(gi,1)[0];inbox.push(item);break;}
  }
  save();render();
}

// ── RENDER ──
function render(){
  renderInbox();
  renderGroups();
  document.getElementById('inboxCt').textContent = inbox.length;
  document.getElementById('groupCt').textContent = groups.length;
}

function renderInbox(){
  const el = document.getElementById('inboxList');
  if(!inbox.length){
    el.innerHTML = '<div style="text-align:center;padding:20px;color:var(--txt3);font-size:11px;font-style:italic;">Inbox empty — paste product names above</div>';
    el.ondragover = null; el.ondrop = null;
    return;
  }
  el.innerHTML = inbox.map(p =>
    `<div class="prod" id="prod-${p.id}" data-id="${p.id}" draggable="true">
      <span class="prod-grip">⠿</span>
      <span class="prod-name">${esc(p.name)}</span>
      <button class="bx del" data-action="remove-inbox" data-id="${p.id}" title="Remove">✕</button>
    </div>`
  ).join('');

  // Wire events on inbox container
  el.ondragover = e => { e.preventDefault(); el.style.background='rgba(78,205,196,.03)'; };
  el.ondragleave = e => { if(!el.contains(e.relatedTarget)) el.style.background=''; };
  el.ondrop = e => { e.preventDefault(); el.style.background=''; onDropInbox(e); };
  el.onclick = e => {
    const btn = e.target.closest('[data-action]');
    if(!btn) return;
    if(btn.dataset.action === 'remove-inbox'){
      removeFromInbox(Number(btn.dataset.id));
    }
  };

  // Wire drag events on each item
  el.querySelectorAll('.prod[draggable]').forEach(div => {
    const id = Number(div.dataset.id);
    div.addEventListener('dragstart', e => {
      dragId = id;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(id));
      setTimeout(() => div.classList.add('dragging'), 0);
    });
    div.addEventListener('dragend', () => {
      dragId = null;
      div.classList.remove('dragging');
      document.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
    });
  });
}

function renderGroups(){
  const area = document.getElementById('groupsArea');
  if(!groups.length){
    area.innerHTML = '<div style="text-align:center;padding:30px;color:var(--txt3);font-size:11px;">No groups yet — click <b style="color:var(--txt2);">+ New Group</b> to create one, then drag products into it.</div>';
    return;
  }

  area.innerHTML = groups.map(g => {
    const shared = g.items.length > 1;
    const badge = shared
      ? `<span style="font-size:10px;font-weight:700;color:var(--teal);background:rgba(78,205,196,.1);border:1px solid rgba(78,205,196,.25);border-radius:3px;padding:1px 7px;white-space:nowrap;">🔗 ${g.items.length} vehicles</span>`
      : `<span style="font-size:10px;color:var(--txt3);background:var(--card);border:1px solid var(--border);border-radius:3px;padding:1px 7px;">${g.items.length} item${g.items.length!==1?'s':''}</span>`;

    const items = g.items.length
      ? g.items.map(item =>
          `<div class="gp" id="prod-${item.id}" data-id="${item.id}" draggable="true">
            <span style="color:var(--txt3);font-size:11px;cursor:grab;">⠿</span>
            <div class="gp-name">${esc(item.name)}</div>
            <button class="bx del" data-action="remove-from-group" data-gid="${g.id}" data-iid="${item.id}" title="Return to inbox">↩</button>
          </div>`
        ).join('')
      : 'Drop products here';

    const imgHtml = g.image
      ? `<div class="gc-img-wrap">
           <img class="gc-img" src="${g.image}" alt="link photo" title="Click to view full size" data-action="view-image" data-gid="${g.id}" style="cursor:zoom-in;">
           <button class="gc-img-del" data-action="remove-image" data-gid="${g.id}" title="Remove image">✕</button>
         </div>`
      : `<div class="gc-img-placeholder" data-action="upload-image" data-gid="${g.id}" title="Add a photo of this link">📷</div>`;

    return `<div class="gc ${g.items.length?'has-items':''}" id="gc-${g.id}" data-gid="${g.id}">
      <div class="gch">
        ${imgHtml}
        <div style="flex:1;min-width:0;">
          ${shared?`<div style="font-size:9px;font-weight:700;color:var(--teal);margin-bottom:4px;">🔗 SAME LINK — ${g.items.length} vehicles</div>`:''}
          <div class="gcn" id="gn-${g.id}" contenteditable="true" data-action="rename" data-gid="${g.id}" style="min-width:0;padding:1px 4px;">${esc(g.name)}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;">
          ${g.items.length ? `<span style="font-size:9px;color:var(--txt3);background:var(--card);border:1px solid var(--border);border-radius:3px;padding:1px 6px;">${g.items.length} item${g.items.length!==1?'s':''}</span>` : ''}
          <button class="bx del" data-action="delete-group" data-gid="${g.id}" title="Delete group">✕</button>
        </div>
      </div>
      <div class="gcb ${g.items.length?'':'empty'}">${items}</div>
      <div class="gcf">
        <input class="dim-inp" placeholder="Dimensions e.g. 92mm M8x1.25" value="${esc(g.dim)}" data-action="dim" data-gid="${g.id}" title="Link dimensions">
        <input class="note-inp" placeholder="Notes..." value="${esc(g.note)}" data-action="note" data-gid="${g.id}">
      </div>
    </div>`;
  }).join('');

  // Wire all group events via delegation and addEventListener
  groups.forEach(g => {
    const card = document.getElementById('gc-' + g.id);
    if(!card) return;

    // Drop zone
    card.addEventListener('dragover', e => {
      e.preventDefault();
      e.stopPropagation();
      e.dataTransfer.dropEffect = 'move';
      card.classList.add('drop-target');
    });
    card.addEventListener('dragleave', e => {
      if(!card.contains(e.relatedTarget)) card.classList.remove('drop-target');
    });
    card.addEventListener('drop', e => {
      e.preventDefault();
      e.stopPropagation();
      card.classList.remove('drop-target');
      const rawId = e.dataTransfer.getData('text/plain') || String(dragId);
      const id = Number(rawId);
      if(!id) return;
      let item = null;
      const ii = inbox.findIndex(x => Number(x.id) === id);
      if(ii >= 0){ item = inbox.splice(ii, 1)[0]; }
      else {
        for(const grp of groups){
          const gi = grp.items.findIndex(x => Number(x.id) === id);
          if(gi >= 0){ item = grp.items.splice(gi, 1)[0]; break; }
        }
      }
      if(!item) return;
      const target = groups.find(grp => Number(grp.id) === Number(g.id));
      if(target && !target.items.find(x => Number(x.id) === id)) target.items.push(item);
      save(); render();
    });

    // Button clicks and input changes via delegation
    card.addEventListener('click', e => {
      const btn = e.target.closest('[data-action]');
      if(!btn) return;
      const action = btn.dataset.action;
      if(action === 'delete-group')           deleteGroup(Number(btn.dataset.gid));
      else if(action === 'remove-from-group') removeFromGroup(Number(btn.dataset.gid), Number(btn.dataset.iid));
      else if(action === 'upload-image')      triggerImageUpload(Number(btn.dataset.gid));
      else if(action === 'remove-image')      removeGroupImage(Number(btn.dataset.gid));
      else if(action === 'view-image'){
        const g = groups.find(x=>Number(x.id)===Number(btn.dataset.gid));
        if(g&&g.image) openLightbox(g.image);
      }
    });
    card.addEventListener('blur', e => {
      const el = e.target;
      if(el.dataset.action === 'rename') renameGroup(Number(el.dataset.gid), el.textContent);
    }, true);
    card.addEventListener('keydown', e => {
      if(e.key === 'Enter' && e.target.contentEditable === 'true'){ e.preventDefault(); e.target.blur(); }
    });
    card.addEventListener('change', e => {
      const el = e.target;
      if(el.dataset.action === 'dim')  updateDim(Number(el.dataset.gid), el.value);
      if(el.dataset.action === 'note') updateNote(Number(el.dataset.gid), el.value);
    });

    // Drag events on items within this group
    card.querySelectorAll('.gp[draggable]').forEach(div => {
      const id = Number(div.dataset.id);
      div.addEventListener('dragstart', e => {
        e.stopPropagation();
        dragId = id;
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', String(id));
        setTimeout(() => div.classList.add('dragging'), 0);
      });
      div.addEventListener('dragend', () => {
        dragId = null;
        div.classList.remove('dragging');
        document.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
      });
    });
  });
}

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── EXPORT ──
function exportCSV(){
  if(!groups.length){toast('No groups to export','err');return;}
  const rows=[['Group Name','Shared Link?','Vehicles in Group','Dimensions','Notes','Product Name']];
  for(const g of groups){
    if(!g.items.length){rows.push([g.name,'No','0',g.dim,g.note,'(empty group)']);continue;}
    for(const item of g.items){rows.push([g.name,g.items.length>1?'Yes':'No',g.items.length,g.dim,g.note,item.name]);}
  }
  if(inbox.length){
    rows.push([]);
    rows.push(['=== UNGROUPED ===','','','','','']);
    for(const item of inbox)rows.push(['(inbox)','No','1','','',item.name]);
  }
  const csv=rows.map(r=>r.map(c=>{const v=String(c||'');return v.includes(',')||v.includes('"')?'"'+v.replace(/"/g,'""')+'"':v;}).join(',')).join('\r\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download='TGK_LinkGroups_'+new Date().toISOString().slice(0,10)+'.csv';a.click();URL.revokeObjectURL(a.href);
  toast('CSV exported','ok');
}

function exportJSON(){
  if(!groups.length){toast('No groups to export','err');return;}
  const out={groups:groups.map(g=>({name:g.name,sharedLink:g.items.length>1,vehicleCount:g.items.length,dim:g.dim,note:g.note,vehicles:g.items.map(x=>x.name)})),ungrouped:inbox.map(x=>x.name)};
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(out,null,2)],{type:'application/json'}));
  a.download='TGK_LinkGroups_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href);
  toast('JSON exported','ok');
}

function triggerImportJSON(){
  document.getElementById('import-json-input').value='';
  document.getElementById('import-json-input').click();
}

function importJSON(input){
  var file=input.files[0];
  if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var parsed=JSON.parse(e.target.result);
      var added=0, skipped=0, inboxAdded=0;

      // Full internal format: {inbox:[], groups:[], nextId}
      if(parsed && parsed.groups && parsed.groups.length && parsed.groups[0].id !== undefined){
        (parsed.inbox||[]).forEach(function(item){
          if(!item.name) return;
          var exists=inbox.find(function(x){ return x.id===item.id||x.name.toLowerCase()===item.name.toLowerCase(); });
          if(!exists){ inbox.push({id:item.id||uid(),name:item.name}); inboxAdded++; }
        });
        (parsed.groups||[]).forEach(function(g){
          if(!g.name) return;
          var exists=groups.find(function(x){ return x.id===g.id||x.name.toLowerCase()===g.name.toLowerCase(); });
          if(exists){ skipped++; return; }
          groups.push({id:g.id||uid(),name:g.name,dim:g.dim||'',note:g.note||'',image:g.image||'',items:(g.items||[]).map(function(x){ return {id:x.id||uid(),name:x.name}; })});
          added++;
        });
        if(parsed.nextId && parsed.nextId>nextId) nextId=parsed.nextId;

      // Simplified export format: {groups:[{name,vehicles,dim,note}], ungrouped:[]}
      } else if(parsed && Array.isArray(parsed.groups)){
        (parsed.ungrouped||[]).forEach(function(name){
          if(!name) return;
          var exists=inbox.find(function(x){ return x.name.toLowerCase()===name.toLowerCase(); });
          if(!exists){ inbox.push({id:uid(),name:name}); inboxAdded++; }
        });
        (parsed.groups||[]).forEach(function(g){
          if(!g.name) return;
          var exists=groups.find(function(x){ return x.name.toLowerCase()===g.name.toLowerCase(); });
          if(exists){ skipped++; return; }
          groups.push({id:uid(),name:g.name,dim:g.dim||'',note:g.note||'',image:'',items:(g.vehicles||[]).map(function(v){ return {id:uid(),name:v}; })});
          added++;
        });

      // Plain array
      } else if(Array.isArray(parsed)){
        parsed.forEach(function(g){
          if(!g.name) return;
          var exists=groups.find(function(x){ return x.name.toLowerCase()===g.name.toLowerCase(); });
          if(exists){ skipped++; return; }
          var items=(g.vehicles||g.items||[]).map(function(v){ return {id:uid(),name:typeof v==='string'?v:v.name}; });
          groups.push({id:uid(),name:g.name,dim:g.dim||'',note:g.note||'',image:'',items:items});
          added++;
        });

      } else {
        toast('Unrecognized JSON format','err');
        return;
      }

      save();
      render();
      var parts=[];
      if(added) parts.push(added+' group'+(added!==1?'s':'')+' added');
      if(inboxAdded) parts.push(inboxAdded+' item'+(inboxAdded!==1?'s':'')+' to inbox');
      if(skipped) parts.push(skipped+' skipped');
      toast(parts.length ? parts.join(', ') : 'Nothing new to import','ok');

    } catch(err){
      toast('Could not read JSON: '+err.message,'err');
    }
  };
  reader.readAsText(file);
}

function clearAll(){
  if(!confirm('Clear everything?'))return;
  inbox=[];groups=[];nextId=1;save();render();toast('Cleared','inf');
}

function openLightbox(src){
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('show');
  document.addEventListener('keydown', _lbKey);
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('show');
  document.getElementById('lightbox-img').src = '';
  document.removeEventListener('keydown', _lbKey);
}
function _lbKey(e){ if(e.key==='Escape') closeLightbox(); }

// ── IMAGE UPLOAD ──
function triggerImageUpload(gid){
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  inp.onchange = () => {
    const file = inp.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const g = groups.find(x => Number(x.id) === gid);
      if(g){ g.image = e.target.result; save(); render(); toast('Image added to group','ok'); }
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

function removeGroupImage(gid){
  const g = groups.find(x => Number(x.id) === gid);
  if(g){ g.image = ''; save(); render(); }
}

// ── AUTO-SCROLL WHILE DRAGGING ──
// Use mousemove (not dragover) — dragover is throttled by browser and unreliable
let _scrollRAF = null;
let _mouseY = -1;
let _isDragging = false;
const SCROLL_ZONE = 100;
const SCROLL_MAX  = 20;

function scrollStep(){
  if(!_isDragging){ _scrollRAF = null; return; }
  const scroller = document.querySelector('.groups-scroll');
  if(!scroller){ _scrollRAF = requestAnimationFrame(scrollStep); return; }
  const rect = scroller.getBoundingClientRect();
  const y = _mouseY;
  const top = rect.top, bot = rect.bottom;
  let speed = 0;
  if(y >= top && y < top + SCROLL_ZONE)
    speed = -SCROLL_MAX * Math.pow(1 - (y - top) / SCROLL_ZONE, 1.5);
  else if(y <= bot && y > bot - SCROLL_ZONE)
    speed =  SCROLL_MAX * Math.pow(1 - (bot - y) / SCROLL_ZONE, 1.5);
  if(speed !== 0) scroller.scrollBy(0, speed);
  _scrollRAF = requestAnimationFrame(scrollStep);
}

function stopScroll(){
  _isDragging = false;
  _mouseY = -1;
  if(_scrollRAF){ cancelAnimationFrame(_scrollRAF); _scrollRAF = null; }
}

document.addEventListener('dragstart', () => {
  _isDragging = true;
  if(!_scrollRAF) _scrollRAF = requestAnimationFrame(scrollStep);
});
document.addEventListener('mousemove', e => { if(_isDragging) _mouseY = e.clientY; });
document.addEventListener('dragend',   stopScroll);
document.addEventListener('drop',      stopScroll);
document.addEventListener('mouseup',   stopScroll);
document.addEventListener('pointerup', stopScroll);
let _tt;
function toast(msg,type){
  const el=document.getElementById('toast');el.textContent=msg;
  el.className='show'+(type==='err'?' err':type==='inf'?' inf':'');
  clearTimeout(_tt);_tt=setTimeout(()=>el.className='',3000);
}

_sbBoot().finally(function(){ load(); });
